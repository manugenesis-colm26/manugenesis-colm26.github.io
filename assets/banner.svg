<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Decorative blurred orbs -->
  <circle cx="200" cy="150" r="120" fill="#667eea" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1000" cy="100" r="100" fill="#764ba2" opacity="0.1" filter="url(#blur1)"/>
  <circle cx="600" cy="250" r="80" fill="#667eea" opacity="0.06" filter="url(#blur2)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1050" y1="0" x2="1050" y2="300"/>
  </g>

  <!-- Decorative circuit nodes -->
  <g opacity="0.15" fill="#667eea">
    <circle cx="150" cy="60" r="3"/>
    <circle cx="300" cy="120" r="2.5"/>
    <circle cx="450" cy="60" r="2"/>
    <circle cx="750" cy="180" r="3"/>
    <circle cx="900" cy="60" r="2.5"/>
    <circle cx="1050" cy="120" r="2"/>
    <circle cx="600" cy="240" r="3"/>
  </g>

  <!-- Factory gear icon left -->
  <g transform="translate(100, 85)" opacity="0.12" fill="none" stroke="#667eea" stroke-width="2">
    <path d="M55,65 L55,58 L61,56 L65,50 L63,44 L68,39 L74,41 L80,37 L82,31 L89,31 L91,37 L97,41 L103,39 L108,44 L106,50 L110,56 L116,58 L116,65 L110,67 L106,73 L108,79 L103,84 L97,82 L91,86 L89,92 L82,92 L80,86 L74,82 L68,84 L63,79 L65,73 L61,67 Z"/>
    <circle cx="85.5" cy="61.5" r="12"/>
  </g>

  <!-- AI network nodes right -->
  <g transform="translate(1000, 70)" opacity="0.1" stroke="#764ba2" stroke-width="1.5" fill="none">
    <circle cx="0" cy="0" r="5" fill="#764ba2" opacity="0.4"/>
    <circle cx="60" cy="30" r="4" fill="#764ba2" opacity="0.3"/>
    <circle cx="30" cy="70" r="6" fill="#764ba2" opacity="0.4"/>
    <circle cx="90" cy="80" r="3.5" fill="#764ba2" opacity="0.3"/>
    <circle cx="70" cy="120" r="4.5" fill="#764ba2" opacity="0.35"/>
    <line x1="0" y1="0" x2="60" y2="30"/>
    <line x1="60" y1="30" x2="30" y2="70"/>
    <line x1="30" y1="70" x2="90" y2="80"/>
    <line x1="0" y1="0" x2="30" y2="70"/>
    <line x1="90" y1="80" x2="70" y2="120"/>
    <line x1="30" y1="70" x2="70" y2="120"/>
  </g>

  <!-- Accent line -->
  <rect x="100" y="115" width="60" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Top label -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" letter-spacing="6" fill="#667eea" opacity="0.9">COLM 2026 WORKSHOP</text>

  <!-- Main title -->
  <text x="600" y="135" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#ffffff">ManuGenesis</text>

  <!-- Subtitle -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#a0a0b8" letter-spacing="0.5">Agentic AI for Autonomous Design, Manufacturing, and Supply Chain</text>

  <!-- Info pills -->
  <g transform="translate(600, 215)">
    <rect x="-230" y="-14" width="200" height="28" rx="14" fill="#667eea" opacity="0.12"/>
    <text x="-130" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#8899ee">October 9, 2026  |  San Francisco</text>

    <rect x="30" y="-14" width="200" height="28" rx="14" fill="#764ba2" opacity="0.12"/>
    <text x="130" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#a07cc5">Hilton Union Square</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)" opacity="0.6"/>
</svg>
